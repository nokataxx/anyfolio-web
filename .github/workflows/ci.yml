name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Lint / Build / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm test
